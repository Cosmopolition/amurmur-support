<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amumur Support</title>
  <script>
    (function() {
      const userLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      let target = 'privacy.html';

      if (userLang.startsWith('zh')) target = '../zh/privacy.html';
      else target = 'privacy.html';

      const basePath = window.location.pathname.replace(/\/en\/.*$/, '/en/').replace(/\/$/, '/en/');
      window.location.replace(basePath + target);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=./privacy.html">
  </noscript>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
